<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdf8f3"/>
      <stop offset="100%" stop-color="#ede0d0"/>
    </linearGradient>
    <!-- Violet accent gradient -->
    <linearGradient id="violetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8a5f7"/>
      <stop offset="100%" stop-color="#9f87ef"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6b5b4f" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  
  <!-- Subtle inner border -->
  <rect x="2" y="2" width="508" height="508" rx="110" ry="110" fill="none" stroke="#d4c4b0" stroke-width="2" stroke-opacity="0.5"/>
  
  <!-- Wallet body -->
  <g filter="url(#shadow)">
    <!-- Wallet flap (top) -->
    <path d="M140 180 L140 160 C140 148 150 138 162 138 L350 138 C362 138 372 148 372 160 L372 180 L140 180Z" fill="url(#violetGrad)" opacity="0.9"/>
    
    <!-- Wallet body -->
    <rect x="140" y="180" width="232" height="200" rx="20" ry="20" fill="url(#violetGrad)"/>
    
    <!-- Wallet clasp -->
    <circle cx="350" cy="280" r="24" fill="#fdf8f3" opacity="0.9"/>
    <circle cx="350" cy="280" r="16" fill="url(#violetGrad)" opacity="0.7"/>
    
    <!-- Card slots (decorative lines) -->
    <rect x="170" y="210" width="140" height="8" rx="4" fill="#fdf8f3" opacity="0.3"/>
    <rect x="170" y="235" width="100" height="8" rx="4" fill="#fdf8f3" opacity="0.2"/>
    <rect x="170" y="260" width="120" height="8" rx="4" fill="#fdf8f3" opacity="0.15"/>
  </g>
  
  <!-- Letter A (monogram) -->
  <text x="256" y="320" font-family="Georgia, serif" font-size="120" font-weight="bold" fill="#fdf8f3" text-anchor="middle" opacity="0.95">A</text>
  
  <!-- Sparkle accent -->
  <circle cx="400" cy="150" r="6" fill="#9f87ef" opacity="0.6"/>
  <circle cx="420" cy="170" r="4" fill="#9f87ef" opacity="0.4"/>
  <circle cx="380" cy="130" r="3" fill="#9f87ef" opacity="0.3"/>
</svg>
